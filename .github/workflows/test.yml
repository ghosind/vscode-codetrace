name: Test

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  test:
    name: Lint, Test & Package Verification
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ['22.x', '24.x', '26.x']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Cache VS Code test binary
        uses: actions/cache@v5
        with:
          path: .vscode-test
          key: vscode-test-${{ runner.os }}-${{ matrix.node-version }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            vscode-test-${{ runner.os }}-${{ matrix.node-version }}-
            vscode-test-${{ runner.os }}-

      - name: Install system dependencies for Electron
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libnspr4 \
            libatk1.0-0t64 \
            libatk-bridge2.0-0t64 \
            libcups2t64 \
            libdrm2 \
            libdbus-1-3 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2 \
            libasound2t64 \
            libegl1 \
            xvfb \
            --no-install-recommends

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint:check

      - name: Compile TypeScript
        run: npm run compile && npm run compile:test

      - name: Run tests & coverage (with xvfb)
        run: xvfb-run --auto-servernum npm test
        env:
          CI: true

      - name: Verify package can be built
        run: npm run package
