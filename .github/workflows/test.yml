name: Test

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  test:
    name: Lint, Test & Package Verification
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ['22.x', '24.x', '26.x']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Cache VS Code test binary
        uses: actions/cache@v5
        with:
          path: .vscode-test
          key: vscode-test-${{ runner.os }}-${{ matrix.node-version }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            vscode-test-${{ runner.os }}-${{ matrix.node-version }}-
            vscode-test-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint:check

      - name: Compile TypeScript
        run: npm run compile

      - name: Run tests & coverage
        run: npm test

      - name: Verify package can be built
        run: npm run package
