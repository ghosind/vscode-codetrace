name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build & Publish VSIX
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Install system dependencies for Electron
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libnspr4 \
            libatk1.0-0t64 \
            libatk-bridge2.0-0t64 \
            libcups2t64 \
            libdrm2 \
            libdbus-1-3 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2 \
            libasound2t64 \
            libegl1 \
            xvfb \
            --no-install-recommends

      - name: Cache VS Code test binary
        uses: actions/cache@v5
        with:
          path: .vscode-test
          key: vscode-test-${{ runner.os }}-24.x-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            vscode-test-${{ runner.os }}-24.x-
            vscode-test-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint:check

      - name: Compile TypeScript
        run: npm run compile && npm run compile:test

      - name: Run tests & coverage (with xvfb)
        run: xvfb-run --auto-servernum npm test
        env:
          CI: true

      - name: Package VSIX
        run: npm run package

      - name: Publish to VS Code Marketplace
        if: success()
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          npx @vscode/vsce publish --packagePath $(ls *.vsix | head -1)

      - name: Upload VSIX as artifact
        uses: actions/upload-artifact@v7
        with:
          name: codetrace-vsix
          path: '*.vsix'
